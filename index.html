<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <style>
        /* 1. 整体视觉：白色背景，深色文字 */
        body { 
            margin: 0; 
            background: #ffffff; /* 确保纯白背景 */
            color: #333333; 
            font-family: "Microsoft YaHei", sans-serif; 
            padding-bottom: 50px; 
        }

        /* 2. 顶部标题：绿色加粗 */
        .top-title { 
            color: #2ecc71; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold; 
            padding: 25px 0; 
        }

        /* 3. 蓝色圆角卡片：对应手绘图 */
        .card {
            background: #5dade2; /* 这种浅蓝色非常清爽 */
            margin: 15px 20px; 
            border-radius: 25px; /* 大圆角效果 */
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            height: 90px;
            padding: 0 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        /* 公告栏：比普通卡片更高一些 */
        .notice-card { 
            height: 150px; 
            font-size: 32px; 
            justify-content: center; 
        }

        /* 下载按钮的小标签 */
        .download-btn { 
            background: rgba(255,255,255,0.2); 
            padding: 6px 15px; 
            border-radius: 12px; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

    <div class="top-title">心做资源库</div>

    <div class="card notice-card">公 告</div>

    <a href="https://www.bilibili.com" class="card">
        <span>bilibili</span>
        <span>视频</span>
    </a>

    <a href="test1.apk" class="card">
        <span>图标  应用软件一</span>
        <span class="download-btn">点击下载</span>
    </a>

    <a href="xinzuo_vpn.apk" class="card">
        <span>图标  应用软件二</span>
        <span class="download-btn">点击下载</span>
    </a>

</body>
</html>
