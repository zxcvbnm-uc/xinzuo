@<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库 - 权限版</title>
    <style>
        /* --- 1. 基础样式 --- */
        body { margin: 0; background: #ffffff; color: #333; font-family: "Microsoft YaHei", sans-serif; padding-bottom: 120px; }
        .page-content { display: none; animation: fadeIn 0.3s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 2. 统一 UI --- */
        .top-header { background: #5dade2; margin: 15px; padding: 20px; border-radius: 25px; text-align: center; color: #2ecc71; font-weight: bold; font-size: 24px; }
        .notice-card { background: #5dade2; margin: 15px; padding: 40px 20px; border-radius: 25px; text-align: center; color: #333; font-size: 32px; font-weight: bold; }
        
        .group-box { background: #5dade2; margin: 15px; border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 22px 20px; color: #000; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .row-item:last-child { border-bottom: none; }
        .res-icon { width: 40px; height: 40px; background: #fff; border-radius: 10px; }
        .dl-btn { color: #000; text-decoration: none; border-bottom: 2px solid #000; font-size: 18px; }

        /* --- 3. 设置页 --- */
        .profile-header { background: #1a1a1a; padding: 45px 20px; display: flex; align-items: center; gap: 20px; color: #ffffff; }
        .avatar { width: 85px; height: 85px; background: #333; border-radius: 50%; border: 2px solid #5dade2; display: flex; align-items: center; justify-content: center; }

        /* --- 4. 管理端样式 --- */
        .admin-form { padding: 20px; }
        .input-item { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .btn-add { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .btn-copy { background: #1a1a1a; color: #5dade2; border: none; padding: 10px; border-radius: 15px; width: 100%; font-size: 14px; }

        /* --- 5. 底部导航 --- */
        .ios-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 35px; display: flex; align-items: center; justify-content: space-around; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #eee; z-index: 2000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #888; font-size: 12px; }
        .nav-link.active { color: #007aff; }
    </style>
</head>
<body>

    <div id="p-home" class="page-content active">
        <div class="top-header">心做资源库</div>
        <div class="notice-card">公 告</div>
        <div class="group-box" id="app-list"></div>
    </div>

    <div id="p-comm" class="page-content">
        <div class="top-header">社 区</div>
        <div class="notice-card" style="font-size: 20px; padding: 60px 20px;">（当前功能还在测试）</div>
    </div>

    <div id="p-sett" class="page-content">
        <div class="profile-header">
            <div class="avatar">头像</div>
            <div class="user-info">
                <div class="user-name">资源管理员</div>
                <div class="user-intro" id="lv-info">Lv.1 | 在线 0 分钟</div>
            </div>
        </div>
        <div class="group-box">
            <div class="row-item" onclick="openAdmin()">
                <span>资源管理后台</span>
                <span style="font-weight: normal; color: #333;">🔒 进入</span>
            </div>
            <div class="row-item" onclick="resetData()" style="color: #c0392b;">
                <span>清空本地数据</span>
            </div>
        </div>
    </div>

    <div id="p-admin" class="page-content">
        <div class="top-header">后台上传</div>
        <div class="admin-form">
            <input type="text" id="app-name" class="input-item" placeholder="输入应用名称">
            <input type="text" id="app-url" class="input-item" placeholder="输入下载链接或BV号">
            <button class="btn-add" onclick="saveNewApp()">发布新资源</button>
            <button class="btn-copy" onclick="copyConfig()">复制更新代码</button>
            <p style="color: #999; font-size: 12px; text-align: center; margin-top: 20px;">
                提示：在此添加后首页即刻可见。<br>若要永久生效，请点击“复制更新代码”并更新代码文件。
            </p>
        </div>
    </div>

    <nav class="ios-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="goPage('p-home', this)"><span>🏠</span><span>首页</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="goPage('p-comm', this)"><span>🌐</span><span>社区</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="goPage('p-sett', this)"><span>⚙️</span><span>设置</span></a>
    </nav>

    <script>
        // --- 核心配置 (管理员密码) ---
        const ADMIN_PWD = "123456"; // <--- 在这里修改你的进入密码

        // --- 路由系统 ---
        function goPage(pageId, el) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function openAdmin() {
            let pwd = prompt("请输入管理员特定密码：");
            if(pwd === ADMIN_PWD) {
                goPage('p-admin');
            } else {
                alert("密码错误，无法进入！");
            }
        }

        // --- 资源存储逻辑 ---
        // 初始资源列表
        let myApps = [
            { name: "应用一", url: "BV1GJ411x7h7" },
            { name: "应用二", url: "BV1uT4y1P7vX" }
        ];

        // 尝试从本地缓存读取你刚刚添加的资源
        let localApps = JSON.parse(localStorage.getItem('xz_custom_apps')) || [];
        let allApps = [...myApps, ...localApps];

        function render() {
            const list = document.getElementById('app-list');
            list.innerHTML = "";
            allApps.forEach(a => {
                const row = document.createElement('div');
                row.className = 'row-item';
                row.innerHTML = `<div style="display:flex;align-items:center;gap:12px;"><div class="res-icon"></div><span>${a.name}</span></div><a href="javascript:void(0)" onclick="dl('${a.url}')" class="dl-btn">下载</a>`;
                list.appendChild(row);
            });
        }

        function saveNewApp() {
            const name = document.getElementById('app-name').value;
            const url = document.getElementById('app-url').value;
            if(name && url) {
                localApps.push({ name, url });
                localStorage.setItem('xz_custom_apps', JSON.stringify(localApps));
                allApps = [...myApps, ...localApps];
                render();
                alert("发布成功！已在首页更新。");
                goPage('p-home');
            }
        }

        function copyConfig() {
            let code = JSON.stringify(allApps, null, 4);
            navigator.clipboard.writeText(code);
            alert("已将最新的资源数组复制到剪贴板！\n你可以将其粘贴到代码的 myApps 处。");
        }

        // --- 其他功能 ---
        function dl(u) { window.location.href = u.startsWith('BV') ? `https://m.bilibili.com/video/${u}` : u; }
        function resetData() { localStorage.clear(); location.reload(); }

        render();
    </script>
</body>
</html>
