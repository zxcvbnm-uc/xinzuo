<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <style>
        /* --- 1. 核心布局样式 --- */
        body { margin: 0; background: #ffffff; color: #333; font-family: sans-serif; padding-bottom: 100px; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* --- 2. 你的特色 UI (蓝色圆角风格) --- */
        .top-header { background: #5dade2; margin: 15px; padding: 15px; border-radius: 20px; text-align: center; color: #fff; font-weight: bold; }
        .card { background: #5dade2; margin: 15px; border-radius: 25px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .row { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); align-items: center; font-weight: bold; }
        .row:last-child { border-bottom: none; }
        .btn-dl { background: #fff; padding: 5px 15px; border-radius: 10px; text-decoration: none; color: #000; font-size: 14px; }

        /* --- 3. 设置页 & 管理框 --- */
        .profile { background: #1a1a1a; padding: 40px 20px; display: flex; align-items: center; gap: 15px; color: #fff; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #5dade2; background: #333; display: flex; align-items: center; justify-content: center; }
        
        /* 隐藏的上传框样式 */
        #admin-panel { display: none; margin: 15px; padding: 20px; background: #fff; border: 3px dashed #5dade2; border-radius: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-post { width: 100%; padding: 12px; background: #5dade2; color: #fff; border: none; border-radius: 10px; font-weight: bold; }

        /* --- 4. 底部导航 --- */
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: #fff; height: 60px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .nav-item { text-decoration: none; color: #888; font-size: 14px; font-weight: bold; }
        .nav-item.active { color: #5dade2; }
    </style>
</head>
<body>

    <div id="p-home" class="page-content active">
        <div class="top-header">心做资源库</div>
        <div class="card" style="padding: 40px; text-align: center; font-size: 30px;">公 告</div>
        <div id="res-list"></div>
    </div>

    <div id="p-comm" class="page-content">
        <div class="top-header">社 区</div>
        <div class="card" style="padding: 50px; text-align: center;">社区建设中...</div>
    </div>

    <div id="p-sett" class="page-content">
        <div class="profile">
            <div class="avatar">头像</div>
            <div>
                <div style="font-size: 18px; font-weight: bold;" id="u-name">游客用户</div>
                <div style="font-size: 12px; color: #5dade2;">Lv.1 | 资源探索者</div>
            </div>
        </div>

        <div id="admin-panel">
            <h3 style="margin-top:0; color:#5dade2;">🚀 管理员上传工具</h3>
            <div class="input-group"><input type="text" id="app-n" placeholder="应用名称"></div>
            <div class="input-group"><input type="text" id="app-u" placeholder="链接 或 BV号"></div>
            <button class="btn-post" onclick="doUpload()">立即发布到首页</button>
        </div>

        <div class="card">
            <div class="row" onclick="masterLogin()" id="login-row">
                <span>管理员登录</span>
                <span style="font-weight: normal; font-size: 12px;">🔒 登录开启权限</span>
            </div>
            <div class="row"><span>QQ群：点击加入</span></div>
            <div class="row" onclick="clearData()" style="color: #e74c3c;"><span>重置本地数据</span></div>
        </div>
    </div>

    <nav class="nav">
        <a href="javascript:void(0)" class="nav-item active" onclick="nav('p-home', this)">首页</a>
        <a href="javascript:void(0)" class="nav-item" onclick="nav('p-comm', this)">社区</a>
        <a href="javascript:void(0)" class="nav-item" onclick="nav('p-sett', this)">设置</a>
    </nav>

    <script>
        // --- 1. 配置：你的超级账号 ---
        const MASTER_ID = "xinzuo";
        const MASTER_PW = "123456"; // 建议以后改成更难的

        // --- 2. 导航逻辑 ---
        function nav(id, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // --- 3. 登录变身逻辑 ---
        function masterLogin() {
            let u = prompt("请输入管理员账号：");
            let p = prompt("请输入管理员密码：");
            if(u === MASTER_ID && p === MASTER_PW) {
                localStorage.setItem('role', 'admin');
                alert("登录成功！上传功能已在下方开启。");
                initAdmin();
            } else {
                alert("账号或密码不匹配。");
            }
        }

        function initAdmin() {
            if(localStorage.getItem('role') === 'admin') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('u-name').innerText = "管理员：心做";
                document.getElementById('login-row').innerHTML = "<span>身份状态</span><span style='color:#2ecc71'>已授权</span>";
            }
        }

        // --- 4. 资源发布逻辑 ---
        // 初始资源列表 (你可以随时在代码里增加)
        let baseApps = [
            { name: "应用一", url: "BV1GJ411x7h7" }
        ];

        function render() {
            const container = document.getElementById('res-list');
            container.innerHTML = "";
            let localApps = JSON.parse(localStorage.getItem('my_apps')) || [];
            let all = [...baseApps, ...localApps];

            all.forEach(a => {
                let card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="row">
                        <div style="display:flex; align-items:center; gap:10px;"><div style="width:30px;height:30px;background:#fff;border-radius:5px;"></div>${a.name}</div>
                        <a href="javascript:void(0)" onclick="go('${a.url}')" class="btn-dl">下载</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function doUpload() {
            let n = document.getElementById('app-n').value;
            let u = document.getElementById('app-u').value;
            if(n && u) {
                let list = JSON.parse(localStorage.getItem('my_apps')) || [];
                list.push({name: n, url: u});
                localStorage.setItem('my_apps', JSON.stringify(list));
                alert("发布成功！");
                render();
                nav('p-home', document.querySelectorAll('.nav-item')[0]); // 自动跳回首页看结果
            }
        }

        function go(u) {
            window.location.href = u.startsWith('BV') ? `https://m.bilibili.com/video/${u}` : u;
        }

        function clearData() {
            if(confirm("确定清除所有本地数据吗？")) { localStorage.clear(); location.reload(); }
        }

        // 初始化
        initAdmin();
        render();
    </script>
</body>
</html>
