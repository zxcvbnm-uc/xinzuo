<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库 - 重制版</title>
    <style>
        /* --- 1. 全局样式 (图4 纯白底色) --- */
        body { 
            margin: 0; background: #ffffff; color: #333;
            font-family: "Microsoft YaHei", sans-serif; 
            padding-bottom: 120px;
        }

        /* --- 2. 标题与公告卡片 (复刻图4顶部) --- */
        .top-header {
            background: #5dade2; /* 这种天蓝色更接近你图中的效果 */
            margin: 15px; padding: 20px;
            border-radius: 25px; text-align: center;
            color: #2ecc71; font-weight: bold; font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .notice-card {
            background: #5dade2; margin: 15px; padding: 40px 20px;
            border-radius: 25px; text-align: center;
            color: #333; font-size: 32px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 3. 资源卡片 (完全复刻图4中间布局) --- */
        .resource-list { padding: 0 15px; }
        .resource-item {
            background: #5dade2; margin-bottom: 15px;
            border-radius: 25px; padding: 25px 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: #000; font-size: 22px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .res-left { display: flex; align-items: center; gap: 15px; }
        .res-icon { width: 45px; height: 45px; background: #fff; border-radius: 10px; }
        .download-btn { color: #000; text-decoration: none; border-bottom: 2px solid #000; }

        /* --- 4. iOS 胶囊导航栏 (复刻图2) --- */
        .ios-capsule-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; height: 70px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 35px; display: flex; align-items: center; justify-content: space-around;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #eee; z-index: 2000;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: #888; font-size: 12px; padding: 10px 0;
            border-radius: 25px; transition: 0.3s;
        }
        .nav-item.active { background: #f0f4ff; color: #007aff; }
        .nav-icon { font-size: 24px; margin-bottom: 2px; }

        /* 等级浮窗 (可选，放在角落不占地方) */
        .lv-badge { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="lv-info" class="lv-badge">Lv.1 | 0 min</div>

    <div class="top-header">心做资源库</div>

    <div class="notice-card">公 告</div>

    <div class="resource-list" id="res-list">
        </div>

    <nav class="ios-capsule-nav">
        <a href="#" class="nav-item active" onclick="sel(this)">
            <span class="nav-icon">🏠</span><span>首页</span>
        </a>
        <a href="#" class="nav-item" onclick="sel(this)">
            <span class="nav-icon">🛒</span><span>商店</span>
        </a>
        <a href="#" class="nav-item" onclick="sel(this)">
            <span class="nav-icon">🌐</span><span>社区</span>
        </a>
        <a href="#" class="nav-item" onclick="sel(this)">
            <span class="nav-icon">⚙️</span><span>设置</span>
        </a>
    </nav>

    <script>
        // --- 核心逻辑：计时与等级 ---
        let start = Date.now();
        let data = JSON.parse(localStorage.getItem('xz_final')) || { lv: 1, exp: 0, total: 0 };

        function sync() {
            let m = Math.floor((Date.now() - start) / 60000);
            if(m > 0) {
                data.exp += m * 10;
                data.total += m;
                data.lv = Math.floor(data.exp / 100) + 1;
                localStorage.setItem('xz_final', JSON.stringify(data));
                start = Date.now();
                document.getElementById('lv-info').innerText = `Lv.${data.lv} | ${data.total} min`;
            }
        }

        // --- 导航切换 ---
        function sel(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // --- 资源渲染 (对应图4：图标 + 应用名 + 下载) ---
        const apps = [
            { name: "应用一", bv: "BV1GJ411x7h7" },
            { name: "应用二", bv: "BV1uT4y1P7vX" },
            { name: "应用三", bv: "BV16f4y1Q7Yv" }
        ];

        const list = document.getElementById('res-list');
        apps.forEach(app => {
            const item = document.createElement('div');
            item.className = 'resource-item';
            item.innerHTML = `
                <div class="res-left">
                    <div class="res-icon"></div>
                    <span>${app.name}</span>
                </div>
                <a href="javascript:void(0)" onclick="go('${app.bv}')" class="download-btn">下载</a>
            `;
            list.appendChild(item);
        });

        function go(bv) {
            sync();
            window.location.href = `https://m.bilibili.com/video/${bv}`;
        }

        setInterval(sync, 30000);
        document.getElementById('lv-info').innerText = `Lv.${data.lv} | ${data.total} min`;
    </script>
</body>
</html>
