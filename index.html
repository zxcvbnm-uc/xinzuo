<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <style>
        /* 1. 基础设置：白色背景 */
        body { 
            margin: 0; 
            background: #ffffff; 
            color: #333333; 
            font-family: "Microsoft YaHei", sans-serif; 
            padding-bottom: 50px; 
        }

        /* 2. 绿色标题 */
        .top-title { 
            color: #2ecc71; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold; 
            padding: 25px 0; 
        }

        /* 3. 蓝色圆角大卡片 */
        .card {
            background: #5dade2; 
            margin: 15px 20px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            height: 90px;
            padding: 0 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 特别加高的公告卡片 */
        .notice-card { height: 150px; font-size: 32px; justify-content: center; }

        /* 下载按钮的小标签 */
        .tag-right { background: rgba(255,255,255,0.2); padding: 6px 15px; border-radius: 12px; font-size: 16px; }

        /* 底部导航栏 */
        .nav-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 60px; 
            background: #fff; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-top: 1px solid #eee; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-title">心做资源库</div>

    <div class="card notice-card">公 告</div>

    <a href="https://www.bilibili.com" class="card">
        <span>bilibili</span>
        <span>视频</span>
    </a>

    <a href="xinzuo_vpn.apk" class="card">
        <span>📦 应用名称</span>
        <span class="tag-right">下载</span>
    </a>

    <div class="nav-bar">
        <span>首页</span>
        <span>商店</span>
        <span>社区</span>
        <span>设置</span>
    </div>

</body>
</html>
