<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>首页</h1>
    <p>欢迎使用心做资源库</p>
</div>

<div class="container">
    <div class="notice-card">
        <span>📢</span>
        <p id="announcement" style="margin:0 0 0 10px; font-size:14px;">加载中...</p>
    </div>

    <div id="software-list">
        </div>
</div>

<div class="footer-nav">
    <div class="nav-item active">
        <span style="font-size:20px;">🏠</span>
        <span>首页</span>
    </div>
    <div class="nav-item">
        <span style="font-size:20px;">📋</span>
        <span>软件</span>
    </div>
    <div class="nav-item">
        <span style="font-size:20px;">🧭</span>
        <span>工具</span>
    </div>
    <div class="nav-item">
        <span style="font-size:20px;">👤</span>
        <span>我的</span>
    </div>
</div>

<script>
    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('announcement').innerText = data.announcement;
            const container = document.getElementById('software-list');
            data.software_list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'software-card';
                card.innerHTML = `
                    <div class="name">${item.name}</div>
                    <button class="get-btn" onclick="alert('提取码：${item.password || '无'}'); window.location.href='${item.url}'">获取</button>
                `;
                container.appendChild(card);
            });
        });
</script>

</body>
</html>
