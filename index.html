<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <style>
        /* --- 1. 全局基础 --- */
        body { 
            margin: 0; 
            background: #ffffff; /* 确保白色背景 */
            color: #333333; 
            font-family: "Microsoft YaHei", sans-serif; 
        }
        .page { display: none; padding-bottom: 80px; }
        .page.active { display: block; }

        /* --- 2. 用户端 UI 组件 --- */
        .top-title { color: #2ecc71; text-align: center; font-size: 28px; font-weight: bold; padding: 20px 0; }
        .blue-card {
            background: #5dade2; 
            margin: 15px 20px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            height: 90px;
            padding: 0 25px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .notice-card { height: 140px; font-size: 30px; justify-content: center; }

        /* --- 3. 管理端 UI 组件 --- */
        .admin-header { background: #1a1a1a; color: white; padding: 30px 20px; display: flex; align-items: center; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #5dade2; margin-right: 15px; background: #333; }
        .admin-btn { 
            background: #4a90e2; color: white; margin: 20px; padding: 20px; 
            border-radius: 15px; text-align: center; cursor: pointer;
        }

        /* --- 4. 底部导航栏 --- */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: #fff; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #eee; z-index: 100;
        }
        .nav-item { text-decoration: none; color: #666; font-size: 14px; text-align: center; flex: 1; }
        .nav-item.active { color: #2ecc71; }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <div class="top-title">心做资源库</div>
        <div class="blue-card notice-card">公 告</div>
        <a href="https://www.bilibili.com" class="blue-card">
            <span>bilibili</span>
            <span>视频</span>
        </a>
        <a href="xinzuo_vpn.zip" class="blue-card">
            <span>应用名称</span>
            <span style="font-size:12px; border:1px solid #fff; padding:2px 8px; border-radius:8px;">下载</span>
        </a>
    </div>

    <div id="adminPage" class="page">
        <div class="admin-header">
            <div class="avatar"></div>
            <div>
                <div style="font-size:18px;">资源管理员</div>
                <div style="font-size:12px; color:#aaa;">Lv.1 | 在线 0 分钟</div>
            </div>
        </div>
        <div class="admin-btn" onclick="alert('请输入管理员密码')">资源管理后台 🔒 进入</div>
        <div class="admin-btn" style="background:#e74c3c;" onclick="confirm('确定清空所有本地数据吗？')">清空本地数据</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('homePage', this)">首页</div>
        <div class="nav-item" onclick="alert('商店暂未开放')">商店</div>
        <div class="nav-item" onclick="alert('社区开发中')">社区</div>
        <div class="nav-item" onclick="showPage('adminPage', this)">设置</div> </nav>

    <script>
        // 页面切换逻辑
        function showPage(pageId, element) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 显示目标页面
            document.getElementById(pageId).classList.add('active');
            // 更新导航栏状态
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
