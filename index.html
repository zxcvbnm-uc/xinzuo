<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <style>
        /* --- 1. 全局基础 --- */
        body { 
    margin: 0; 
    background: #ffffff; /* 这里的 #ffffff 代表白色背景 */
    color: #333333;      /* 这里的 #333333 代表深灰色文字 */
    font-family: "Microsoft YaHei", sans-serif; 
    padding-bottom: 100px; 
}
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* --- 2. 你的手绘风 UI 组件 --- */
        .top-title { color: #2ecc71; text-align: center; font-size: 28px; font-weight: bold; padding: 20px 0; }
        
        /* 蓝色大卡片基类 */
        .blue-card { 
            background: #5dade2; 
            margin: 10px 20px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            color: #1a1a1a;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(91,173,226,0.3);
            transition: transform 0.1s;
        }
        .blue-card:active { transform: scale(0.98); }

        /* 公告板 */
        .notice-board { height: 180px; font-size: 40px; font-weight: bold; color: #34495e; }

        /* 资源容器（黑色背景区） */
        .res-container { background: #000; padding: 10px 0; }

        /* Bilibili 视频卡片 */
        .bili-card { height: 100px; font-size: 28px; font-weight: bold; gap: 40px; }

        /* 下载资源卡片 */
        .dl-card { height: 100px; font-size: 24px; font-weight: bold; position: relative; }
        .dl-card .tag-left { position: absolute; left: 25px; }
        .dl-card .tag-mid { position: absolute; left: 50%; transform: translateX(-50%); }
        .dl-card .tag-right { position: absolute; right: 25px; }

        /* --- 3. 设置页样式 --- */
        .profile-box { padding: 40px 20px; display: flex; align-items: center; gap: 20px; }
        .avatar-circle { width: 90px; height: 90px; background: #000; border: 2px solid #5dade2; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .info-rect { background: #000; border: 1px solid #333; padding: 15px 30px; flex-grow: 1; font-size: 18px; line-height: 1.6; }

        /* 管理上传框 */
        #admin-panel { display: none; margin: 20px; padding: 20px; background: #fff; border-radius: 20px; color: #333; }
        .input-style { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }

        /* --- 4. 底部导航栏 --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #eee; }
        .nav-item { text-decoration: none; color: #000; font-size: 20px; font-weight: bold; }
        .nav-item.active { color: #5dade2; border-bottom: 3px solid #5dade2; }
    </style>
</head>
<body>

    <div id="p-home" class="page-content active">
        <div class="top-title">心做资源库</div>
        
        <div class="blue-card notice-board">公 告</div>

        <div class="res-container" id="res-list">
            </div>
    </div>

    <div id="p-comm" class="page-content">
        <div class="top-title">社 区</div>
        <div class="blue-card" style="height:200px; font-size:24px;">社区内容建设中...</div>
    </div>

    <div id="p-sett" class="page-content">
        <div class="profile-box">
            <div class="avatar-circle">头像</div>
            <div class="info-rect">
                <div id="u-name">名字：游客</div>
                <div id="u-lv">等级：Lv.1</div>
                <div>介绍：资源库用户</div>
            </div>
        </div>

        <div id="admin-panel">
            <h3 style="margin-top:0">上传新模块</h3>
            <input type="text" id="in-name" class="input-style" placeholder="应用名称">
            <input type="text" id="in-bili" class="input-style" placeholder="Bilibili BV号 (选填)">
            <input type="text" id="in-dl" class="input-style" placeholder="下载链接">
            <button onclick="doUpload()" style="width:100%; padding:12px; background:#5dade2; border:none; border-radius:10px; color:white; font-weight:bold;">发布到首页</button>
        </div>

        <div class="blue-card" style="height:120px; font-size:22px; color:#1a1a1a;" onclick="masterLogin()">
            <span id="login-txt">管理员登录 (特定账号)</span>
        </div>
        
        <div class="blue-card" style="height:60px; font-size:18px;" onclick="clearData()">重置所有数据</div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="nav('p-home', this)">首页</a>
        <a href="javascript:void(0)" class="nav-item" onclick="nav('p-comm', this)">社区</a>
        <a href="javascript:void(0)" class="nav-item" onclick="nav('p-sett', this)">设置</a>
    </nav>

    <script>
        const MASTER = { id: "xinzuo", pw: "123456" };

        function nav(id, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function masterLogin() {
            let u = prompt("管理员账号：");
            let p = prompt("管理员密码：");
            if(u === MASTER.id && p === MASTER.pw) {
                localStorage.setItem('is_admin', 'true');
                alert("登录成功！");
                location.reload();
            } else { alert("账号错误"); }
        }

        if(localStorage.getItem('is_admin') === 'true') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('u-name').innerText = "名字：心做管理员";
            document.getElementById('login-txt').innerText = "管理员：已在线";
        }

        // --- 核心：资源渲染逻辑 (完全对应你的原型图) ---
        let baseData = [
            { name: "应用一", bili: "BV1GJ411x7h7", dl: "#" }
        ];

        function render() {
            const list = document.getElementById('res-list');
            list.innerHTML = "";
            let locals = JSON.parse(localStorage.getItem('my_res')) || [];
            let all = [...baseData, ...locals];

            all.forEach(item => {
                // 1. 如果有B站视频，先渲染视频大卡片
                if(item.bili) {
                    let bCard = document.createElement('a');
                    bCard.className = 'blue-card bili-card';
                    bCard.href = `https://m.bilibili.com/video/${item.bili}`;
                    bCard.innerHTML = `<span>Bilibili</span> <span>视频</span>`;
                    list.appendChild(bCard);
                }

                // 2. 接着渲染下载大卡片
                let dCard = document.createElement('a');
                dCard.className = 'blue-card dl-card';
                dCard.href = item.dl;
                dCard.innerHTML = `
                    <span class="tag-left">图标</span>
                    <span class="tag-mid">${item.name}</span>
                    <span class="tag-right">下载</span>
                `;
                list.appendChild(dCard);

                // 加一个黑色间距，还原手绘的感觉
                let space = document.createElement('div');
                space.style.height = "20px";
                list.appendChild(space);
            });
        }

        function doUpload() {
            let n = document.getElementById('in-name').value;
            let b = document.getElementById('in-bili').value;
            let d = document.getElementById('in-dl').value;
            if(n && d) {
                let list = JSON.parse(localStorage.getItem('my_res')) || [];
                list.push({name: n, bili: b, dl: d});
                localStorage.setItem('my_res', JSON.stringify(list));
                alert("模块已发布！");
                location.reload();
            }
        }

        function clearData() { if(confirm("确定吗？")) { localStorage.clear(); location.reload(); } }

        render();
    </script>
</body>
</html>
