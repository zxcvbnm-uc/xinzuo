<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <style>
        /* --- 1. 全局基础：背景白色，文字深灰 --- */
        body { margin: 0; background: #ffffff; color: #333333; font-family: "Microsoft YaHei", sans-serif; padding-bottom: 100px; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* --- 2. 蓝色大卡片（对应你的手绘原型） --- */
        .top-title { color: #2ecc71; text-align: center; font-size: 28px; font-weight: bold; padding: 20px 0; }
        
        .blue-card { 
            background: #5dade2; 
            margin: 15px 20px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            color: #ffffff; /* 卡片文字设为白色，更清晰 */
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .notice-board { height: 160px; font-size: 36px; font-weight: bold; }
        .bili-card { height: 90px; font-size: 26px; font-weight: bold; gap: 20px; }
        .dl-card { height: 90px; font-size: 22px; font-weight: bold; position: relative; }
        
        /* 原型：左图标、中名字、右下载 */
        .tag-left { position: absolute; left: 20px; }
        .tag-mid { position: absolute; left: 50%; transform: translateX(-50%); }
        .tag-right { position: absolute; right: 20px; }

        /* --- 3. 设置页：资料展示卡片 --- */
        .profile-box { padding: 30px 20px; display: flex; align-items: center; gap: 15px; }
        .avatar-circle { width: 80px; height: 80px; background: #333; border: 2px solid #5dade2; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .info-rect { background: #f9f9f9; border: 1px solid #eee; padding: 15px; flex-grow: 1; border-radius: 15px; line-height: 1.6; }

        /* 后台上传区域（登录后可见） */
        #admin-panel { display: none; margin: 15px 20px; padding: 20px; border: 2px dashed #5dade2; border-radius: 20px; }
        .input-style { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }

        /* --- 4. 底部导航栏 --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .nav-link { text-decoration: none; color: #333; font-size: 18px; font-weight: bold; text-align: center; }
        .nav-link.active { color: #5dade2; }
    </style>
</head>
<body>

    <div id="p-home" class="page-content active">
        <div class="top-title">心做资源库</div>
        <div class="blue-card notice-board">公 告</div>
        <div id="res-list"></div>
    </div>

    <div id="p-sett" class="page-content">
        <div class="top-title">个 人 设 置</div>
        <div class="profile-box">
            <div class="avatar-circle">头像</div>
            <div class="info-rect">
                <div id="u-name">名字：游客用户</div>
                <div id="u-lv">等级：Lv.2</div>
                <div>状态：在线 20 分钟</div>
            </div>
        </div>

        <div id="admin-panel">
            <h3 style="margin-top:0">🚀 资源发布后台</h3>
            <input type="text" id="in-name" class="input-style" placeholder="应用名称">
            <input type="text" id="in-bili" class="input-style" placeholder="Bilibili BV号 (选填)">
            <input type="text" id="in-dl" class="input-style" placeholder="下载链接">
            <button onclick="doUpload()" style="width:100%; padding:12px; background:#2ecc71; color:white; border:none; border-radius:10px; font-weight:bold;">发布资源</button>
        </div>

        <div class="blue-card" style="height:80px; font-size:20px;" onclick="masterLogin()">
            <span id="login-txt">管理员登录 (输入特定密码)</span>
        </div>
        <div class="blue-card" style="height:60px; font-size:18px; background:#e74c3c;" onclick="clearData()">清空所有数据</div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-link active" onclick="nav('p-home', this)">首页</a>
        <a href="javascript:void(0)" class="nav-link" onclick="nav('p-sett', this)">设置</a>
    </nav>

    <script>
        const MASTER_PWD = "123456"; // 默认密码

        function nav(id, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function masterLogin() {
            let p = prompt("请输入管理密码：");
            if(p === MASTER_PWD) {
                localStorage.setItem('role', 'admin');
                alert("密码正确，后台已开启！");
                location.reload();
            } else { alert("密码错误，无法进入！"); }
        }

        if(localStorage.getItem('role') === 'admin') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('u-name').innerText = "名字：资源管理员";
            document.getElementById('login-txt').innerText = "身份：管理员已认证";
        }

        // 默认数据
        let baseData = [
            { name: "官方资源一", bili: "BV1GJ411x7h7", dl: "https://zxcvbnm-uc.github.io/xinzuo/" }
        ];

        function render() {
            const list = document.getElementById('res-list');
            list.innerHTML = "";
            let locals = JSON.parse(localStorage.getItem('my_res')) || [];
            let all = [...baseData, ...locals];

            all.forEach(item => {
                if(item.bili) {
                    let b = document.createElement('a');
                    b.className = 'blue-card bili-card';
                    b.href = "https://m.bilibili.com/video/" + item.bili;
                    b.innerHTML = "<span>Bilibili</span> <span>视频</span>";
                    list.appendChild(b);
                }
                let d = document.createElement('a');
                d.className = 'blue-card dl-card';
                d.href = item.dl;
                d.innerHTML = `<span class="tag-left">图标</span><span class="tag-mid">${item.name}</span><span class="tag-right">下载</span>`;
                list.appendChild(d);
                let space = document.createElement('div');
                space.style.height = "20px";
                list.appendChild(space);
            });
        }

        function doUpload() {
            let n = document.getElementById('in-name').value;
            let b = document.getElementById('in-bili').value;
            let d = document.getElementById('in-dl').value;
            if(n && d) {
                let list = JSON.parse(localStorage.getItem('my_res')) || [];
                list.push({name: n, bili: b, dl: d});
                localStorage.setItem('my_res', JSON.stringify(list));
                alert("发布成功！");
                location.reload();
            }
        }

        function clearData() { if(confirm("确定重置吗？")) { localStorage.clear(); location.reload(); } }
        render();
    </script>
</body>
</html>
