<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库 - Steam x Bili</title>
    <style>
        /* 这里保持之前的 Steam x iOS 混合风格 */
        :root { --steam-dark: #171a21; --steam-blue: #1b2838; --steam-accent: #66c0f4; }
        body { margin: 0; background: var(--steam-dark); color: #c7d5e0; font-family: sans-serif; padding-bottom: 100px; }
        .header { background: linear-gradient(#1b2838, #171a21); padding: 20px; border-bottom: 1px solid #333; }
        .user-card { margin: 15px; padding: 15px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .progress-container { height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; margin-top: 10px; overflow: hidden; }
        #exp-bar { width: 0%; height: 100%; background: #66c0f4; transition: 0.5s; }
        .item-card { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; margin: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .play-btn { background: #536904; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; width: 100%; margin-top: 10px; }
        .ios-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(20,20,20,0.8); backdrop-filter: blur(15px); border-radius: 30px; display: flex; padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .nav-item { flex: 1; text-align: center; color: #8e8e93; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size:18px;">STORE</h1>
    </div>

    <div class="user-card">
        <div style="display:flex; justify-content:space-between;">
            <span>心做用户 <b id="user-lv" style="color:#66c0f4;">Lv.1</b></span>
            <span style="font-size:12px;">已在线 <b id="online-time">0</b> min</span>
        </div>
        <div class="progress-container"><div id="exp-bar"></div></div>
    </div>

    <div id="software-list"></div>

    <nav class="ios-nav">
        <a href="#" class="nav-item" style="color:#66c0f4;">商店</a>
        <a href="#" class="nav-item">库</a>
        <a href="#" class="nav-item">社区</a>
        <a href="#" class="nav-item">设置</a>
    </nav>

    <script>
        // ★★★ 关键点 1：初始化数据（从“小本子”读取旧等级）
        let startTime = Date.now();
        let userData = JSON.parse(localStorage.getItem('xz_data')) || { lv: 1, exp: 0, total: 0 };

        // 渲染界面的函数
        function renderUI() {
            document.getElementById('user-lv').innerText = `Lv.${userData.lv}`;
            document.getElementById('exp-bar').style.width = (userData.exp % 100) + "%";
            document.getElementById('online-time').innerText = userData.total;
        }

        // ★★★ 关键点 2：保存数据的逻辑
        function syncData() {
            let now = Date.now();
            let diff = Math.floor((now - startTime) / 60000); 
            if (diff > 0) {
                userData.exp += diff * 5; 
                userData.total += diff;
                userData.lv = Math.floor(userData.exp / 100) + 1;
                localStorage.setItem('xz_data', JSON.stringify(userData));
                startTime = now; 
                renderUI();
            }
        }

        // ★★★ 关键点 3：像浏览器一样全屏打开 Bilibili
        function playBili(bvid) {
            syncData(); // 走之前存一下经验
            // 直接覆盖当前页面，推开 B站 移动端官网
            window.location.href = `https://m.bilibili.com/video/${bvid}`;
        }

        // ★★★ 关键点 4：自动生成带封面的列表（Steam 大图感）
        const myResources = [
            { name: "极客必备工具箱", bv: "BV1GJ411x7h7" },
            { name: "心做专属皮肤包", bv: "BV1uT4y1P7vX" }
        ];

        const listDiv = document.getElementById('software-list');
        myResources.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <div style="width:100%; height:160px; background:url('https://archive.bilibili.com/archive/cover/fetch?bvid=${item.bv}') center/cover; border-radius:8px;"></div>
                <div style="margin-top:10px; font-weight:bold;">${item.name}</div>
                <button class="play-btn" onclick="playBili('${item.bv}')">进入 Bilibili 观看</button>
            `;
            listDiv.appendChild(card);
        });

        // ★★★ 关键点 5：启动！
        renderUI();
        setInterval(syncData, 30000); // 每30秒自动存一次
        window.onbeforeunload = syncData; // 关闭网页存一次
    </script>
</body>
</html>
