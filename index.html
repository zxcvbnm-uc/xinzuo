<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库</title>
    <style>
        /* 1. 基础：白色背景 */
        body { 
            margin: 0; 
            background: #ffffff; 
            color: #333333; 
            font-family: sans-serif; 
            padding-bottom: 80px; /* 为底部导航留出空间 */
        }

        /* 2. 绿色标题 */
        .top-title { 
            color: #2ecc71; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold; 
            padding: 25px 0; 
        }

        /* 3. 蓝色圆角大卡片样式 */
        .card {
            background: #5dade2; 
            margin: 15px 20px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            height: 90px;
            padding: 0 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 公告栏卡片 */
        .notice-card { height: 150px; font-size: 32px; justify-content: center; }

        /* 4. 底部固定导航栏 (你要的“设置”就在这！) */
        .nav-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 70px; 
            background: #ffffff; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-top: 1px solid #eeeeee; 
            z-index: 100;
        }

        .nav-item {
            text-decoration: none;
            color: #333333;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 激活状态颜色 */
        .nav-item.active { color: #5dade2; }
    </style>
</head>
<body>

    <div class="top-title">心做资源库</div>

    <div class="card notice-card">公 告</div>

    <a href="https://www.bilibili.com" class="card">
        <span>bilibili</span>
        <span>视频</span>
    </a>

    <a href="xinzuo_vpn.zip" class="card">
        <span>📦 压缩包资源</span>
        <span style="background:rgba(255,255,255,0.2); padding:6px 12px; border-radius:12px; font-size:14px;">下载</span>
    </a>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><span>🏠</span><span>首页</span></a>
        <a href="#" class="nav-item"><span>🛒</span><span>商店</span></a>
        <a href="#" class="nav-item"><span>💬</span><span>社区</span></a>
        <a href="#" class="nav-item"><span>⚙️</span><span>设置</span></a>
    </nav>

</body>
</html>
