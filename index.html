<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心做资源库 - Steam Edition</title>
    <style>
        /* Steam 深色主题 */
        :root {
            --steam-blue: #1b2838;
            --steam-dark: #171a21;
            --steam-accent: #66c0f4;
            --steam-card: #2a475e;
            --text-main: #c7d5e0;
        }

        body { 
            background-color: var(--steam-blue); 
            color: var(--steam-main);
            margin: 0; padding-bottom: 70px; font-family: "Motiva Sans", Sans-serif; 
        }

        /* 顶部导航 */
        .header { 
            background: var(--steam-dark); padding: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .header h1 { color: #fff; margin: 0; font-size: 22px; letter-spacing: 1px; }

        /* Steam 风格大横幅（轮播位） */
        .featured-banner {
            width: 100%; height: 180px;
            background: linear-gradient(to bottom, transparent, var(--steam-blue)), url('https://pic.imgdb.cn/item/656847efc458853aef11f26a.jpg');
            background-size: cover; display: flex; align-items: flex-end; padding: 15px; box-sizing: border-box;
        }
        .featured-title { font-weight: bold; color: white; font-size: 18px; text-shadow: 2px 2px 4px #000; }

        .container { padding: 15px; }

        /* 分类标题 */
        .section-label { color: var(--steam-accent); font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }

        /* 资源列表：Steam 列表样式 */
        .software-card { 
            background: rgba(0,0,0,0.2); border-radius: 4px; padding: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid transparent; transition: 0.3s;
        }
        .software-card:active { background: var(--steam-card); border-left-color: var(--steam-accent); }
        .sw-info { display: flex; flex-direction: column; }
        .sw-name { color: #fff; font-size: 16px; margin-bottom: 4px; }
        .sw-tag { color: var(--steam-accent); font-size: 11px; background: rgba(102, 192, 244, 0.1); padding: 2px 6px; width: fit-content; border-radius: 2px; }

        .get-btn { 
            background: linear-gradient(to bottom, #a4d007 5%, #536904 95%);
            color: white; border: none; padding: 8px 15px; border-radius: 2px;
            font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* 底部导航 */
        .footer-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px; 
            background: #171a21; display: flex; border-top: 1px solid #333; 
        }
